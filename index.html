<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Happy Birthday Eley ♡</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#f9a8c0}
#home,#gallery{position:fixed;inset:0;transition:opacity .6s ease}
#gallery{opacity:0;pointer-events:none}
body.show-gallery #home{opacity:0;pointer-events:none}
body.show-gallery #gallery{opacity:1;pointer-events:all}
.page-bg{position:absolute;inset:0;background:linear-gradient(180deg,#f0d4f8 0%,#e8b4f0 35%,#d490e8 70%,#c070d8 100%);z-index:0;overflow:hidden}
.wave-back,.wave-front{position:absolute;bottom:0;left:0;width:100%;pointer-events:none}
.wave-back{height:55%;z-index:1}
.wave-front{height:42%;z-index:2}

/* HOME */
#home-layout{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;width:100%;height:100%;padding:0 6vw}
#home-text{flex:0 0 auto;max-width:48%;animation:fadeUp .9s .2s both}
.label-small{font-family:'Nunito',sans-serif;font-size:clamp(9px,1.1vw,13px);letter-spacing:.3em;color:rgba(80,20,100,.6);text-transform:uppercase;margin-bottom:10px}
.title-happy,.title-bday{font-family:'Fredoka One',cursive;font-size:clamp(48px,9vw,115px);line-height:.92;color:rgba(255,255,255,.15);-webkit-text-stroke:2px rgba(255,255,255,.45);letter-spacing:-.01em;display:block}
.title-bday{margin-bottom:10px}
.title-name{font-family:'Fredoka One',cursive;font-size:clamp(38px,6.8vw,85px);line-height:1;background:linear-gradient(90deg,#e0b4ff,#ffd6f0,#b4d4ff,#e0b4ff);background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 3s linear infinite;display:block;margin-bottom:18px}
@keyframes shimmer{0%{background-position:0%}100%{background-position:200%}}
.home-sub{font-family:'Nunito',sans-serif;font-size:clamp(11px,1.3vw,15px);color:rgba(60,10,80,.65);line-height:1.7;max-width:320px;margin-bottom:28px}
#next-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 36px;border-radius:50px;border:1.5px solid rgba(255,255,255,.55);background:rgba(255,255,255,.22);backdrop-filter:blur(12px);color:#5a1a80;font-size:13px;font-family:'Nunito',sans-serif;font-weight:700;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:0 6px 24px rgba(140,60,200,.22)}
#next-btn:hover{transform:scale(1.06) translateY(-2px);box-shadow:0 14px 36px rgba(140,60,200,.35)}

/* CAKE CANVAS CONTAINERS */
#cake-side{flex:0 0 auto;display:flex;align-items:center;justify-content:center;height:100%;position:relative;z-index:10}
#home-canvas-wrap{width:clamp(280px,38vw,520px);height:clamp(320px,70vh,620px);position:relative}
#home-canvas-wrap canvas{width:100%!important;height:100%!important;display:block}

/* GALLERY */
#gallery{z-index:5}
#gallery-inner{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:grab}
#gallery-inner:active{cursor:grabbing}
#gallery-canvas-wrap{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:20;width:280px;height:340px;pointer-events:none}
#gallery-canvas-wrap canvas{width:100%!important;height:100%!important;display:block}
#carousel-3d{position:absolute;left:50%;top:50%;width:0;height:0;pointer-events:none}
.photo-card{position:absolute;pointer-events:all;cursor:pointer;will-change:transform}
.photo-card .photo-inner{background:#fff;border-radius:6px;padding:9px 9px 30px;width:110px;position:relative}
.photo-card .photo-inner img{width:100%;height:100px;object-fit:cover;border-radius:3px;display:block;pointer-events:none}
.photo-card .photo-inner .cap{font-size:8px;text-align:center;color:#8b6080;font-family:'Nunito',sans-serif;margin-top:6px;line-height:1.3}
#hint{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:rgba(80,20,100,.7);z-index:30;font-family:'Nunito',sans-serif;pointer-events:none;background:rgba(255,255,255,.25);backdrop-filter:blur(8px);padding:7px 20px;border-radius:30px;border:1px solid rgba(255,255,255,.4)}

/* MODAL */
#modal{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:rgba(40,10,60,.55);backdrop-filter:blur(10px);opacity:0;pointer-events:none;transition:opacity .35s;padding:16px}
#modal.open{opacity:1;pointer-events:all}
#modal-box{background:linear-gradient(160deg,#fffef8,#fdf0ff);border-radius:16px;box-shadow:0 32px 80px rgba(80,10,120,.28);display:flex;max-width:700px;width:100%;overflow:hidden;transform:scale(.9);transition:transform .4s cubic-bezier(.34,1.56,.64,1);max-height:88vh}
#modal.open #modal-box{transform:scale(1)}
#modal-img{flex:0 0 42%;overflow:hidden}
#modal-img img{width:100%;height:100%;object-fit:cover;display:block}
#modal-text{flex:1;padding:36px 30px 28px;display:flex;flex-direction:column;justify-content:center;overflow:auto;background-image:repeating-linear-gradient(transparent,transparent 27px,rgba(160,100,200,.15) 28px);background-size:100% 28px}
#modal-text .mlabel{font-size:10px;letter-spacing:.3em;color:#a070c0;text-transform:uppercase;margin-bottom:8px;font-family:'Nunito',sans-serif}
#modal-text h2{font-size:clamp(20px,3.5vw,26px);color:#3a1060;margin-bottom:16px;line-height:1.2;font-family:'Fredoka One',cursive}
#modal-text p{font-size:14.5px;line-height:2;color:#5a3070;font-style:italic;font-family:'Nunito',sans-serif}
#modal-close{position:absolute;top:14px;right:16px;background:none;border:none;font-size:22px;color:#9060a0;cursor:pointer;z-index:10;line-height:1}

@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes floatP{0%{transform:translateY(0)}100%{transform:translateY(-20px)}}
.particle{position:fixed;border-radius:50%;pointer-events:none;animation:floatP ease-in-out infinite alternate;z-index:1}
@media(max-width:680px){
  #home-layout{flex-direction:column;justify-content:flex-end;padding-bottom:70px;gap:0}
  #cake-side{height:auto}
  #home-canvas-wrap{width:260px;height:280px}
  #home-text{max-width:100%;text-align:center}
  .home-sub{margin:0 auto 20px}
  #next-btn{margin:0 auto;display:flex}
}
</style>
</head>
<body>

  <div class="page-bg">
    <svg class="wave-back" viewBox="0 0 1440 420" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg"><path d="M0,180 C200,80 400,280 600,160 C800,40 1000,220 1200,140 C1350,80 1420,160 1440,140 L1440,420 L0,420 Z" fill="rgba(160,80,220,0.45)"/></svg>

<!-- GALLERY -->
<div id="gallery">

    <svg class="wave-back" viewBox="0 0 1440 420" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg"><path d="M0,180 C200,80 400,280 600,160 C800,40 1000,220 1200,140 C1350,80 1420,160 1440,140 L1440,420 L0,420 Z" fill="rgba(160,80,220,0.45)"/></svg>
    <svg class="wave-front" viewBox="0 0 1440 320" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg"><path d="M0,160 C180,60 360,240 560,130 C760,20 960,200 1160,110 C1320,40 1410,120 1440,100 L1440,320 L0,320 Z" fill="rgba(140,60,200,0.6)"/></svg>
  </div>
  <div id="gallery-inner">
    <div id="carousel-3d"></div>
    <div id="gallery-canvas-wrap"></div>
    <div id="hint">Scroll · Swipe · Hover to explore</div>
  </div>
</div>

<!-- MODAL -->
<div id="modal">
  <div id="modal-box">
    <div id="modal-img"><img id="modal-img-el" src="" alt=""/></div>
    <div id="modal-text">
      <div class="mlabel">Memory Note</div>
      <h2 id="modal-title"></h2>
      <p id="modal-letter"></p>
    </div>
    <button id="modal-close" onclick="closeModal()">✕</button>
  </div>
</div>

<audio id="bgm" loop><source src="theme-song.mp3" type="audio/mpeg"></audio>

<script>
// ══════════════════════════════════════════════════════════
// MEMORIES

const memories = [
  { image:"IMG_2204.jpg", title:"Full of Butterflies",      letter:"This era of our life became filled with beautiful and unforgettable moments because of you. I'm endlessly grateful you came into my world and made me feel whole in ways I never thought possible. Hanggang ngayon, walang sawang 'I love you so much, mahal na mahal kita sobra, Eley.'" },
  { image:"IMG_4265.jpg", title:"Eyes upon Him",            letter:"For the first time in my life, I met someone with the purest heart and the most faithful soul. I deeply admire the way you love Him—it reflects through your kindness, your warmth, and your beautiful spirit. You are truly a gift from God, Eley, and loving you feels like answered prayers in human form." },
  { image:"IMG_6723.jpg", title:"Soul that Explores",       letter:"A soul that living life to the fullest, guided by no fear except Him. You wander through the world like freedom itself, embracing every moment as if escaping into light. I love how you include me in your dreams and plans, like I belong in your future. I admire you, always." },
  { image:"IMG_6212.jpg", title:"Childhood Dream",          letter:"You are the one who brought back my childhood joy. I never got to experience Ocean Park before, but my first time was with you—and that made it unforgettable. I'm truly grateful, every memory with you will never fade, and this one stays as one of the best in my heart." },
  { image:"IMG_6810.jpg", title:"Still Seeing You",         letter:"Every time I close my eyes, I never forget you—your gorgeous smile, soft-spoken voice, and pure almond eyes. I admire all of you, inside and out. That moment we slept together, eyes closed in a shared frame, stays like a quiet dream I never want to wake from." },
  { image:"IMG_7934.jpg", title:"Love in Its Purest Form",  letter:"Enjoying life with your presence feels like the best time I've ever had. I'll cherish every effort you give to us. One day, ako naman—my turn to give back. I love you so much, always." },
  { image:"IMG_7298.jpg", title:"Found a Bestfriend",       letter:"Not just happiness—we laugh, we cry, and we grow together in this journey. Go chase your dreams, follow your heart with your mind, and never forget God. I'll support you always." },
  { image:"IMG_6959.jpg", title:"Endlessly, With You",      letter:"Another memory with you, living life side by side—every moment feels alive. I'll do this again and again with you, until your hair turns white. I love who I am when I'm with you." },
  { image:"IMG_9595.jpg", title:"Beauty in Silence",        letter:"Your smile is one of my favorites in you—please keep it, even when I'm far away. Your presence is one-of-a-kind, something no one else can give. You inspire people, and I was the first." },
  { image:"IMG_1359.jpg", title:"Because of You",           letter:"Every time you make efforts, I feel more inspired to strive harder so I can give you the same love. Love should be free, fair, and pure. I truly appreciate you, Eley, always." },
  { image:"IMG_1024.jpg", title:"Love Beyond Flaws",        letter:"You didn't leave when you saw my worst—my mistakes, insecurities, and darkness. You stayed through it all, loving a man who doesn't even know what you truly saw in me." },
  { image:"IMG_7789.jpg", title:"Birthday Girl ♡",          letter:"Happy birthday, Eley. I'm so proud of you. I still remember when you once thought life might only last until 25, yet here you are at 29—still standing, still growing, still chasing your dreams with courage and faith in your heart. I admire the kindness you continuously give to the people around you, and I hope the world always stays gentle with you. Keep exploring, loving, caring, and believing in God through every season of your life. I'll always be here supporting you, appreciating your patience, efforts, and pure love. Marami ka pang makakamit, Eley—this is only the beginning. I love you so much.          Love, Eron." },
];

// ══════════════════════════════════════════════════════════
// PARTICLES
// ══════════════════════════════════════════════════════════
for(let i=0;i<18;i++){
  const p=document.createElement('div');p.className='particle';
  p.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${3+Math.random()*6}px;height:${3+Math.random()*6}px;background:rgba(200,150,255,${.15+Math.random()*.4});animation-duration:${4+Math.random()*6}s;animation-delay:${Math.random()*4}s`;
  document.body.appendChild(p);
}

// ══════════════════════════════════════════════════════════
// THREE.JS CAKE BUILDER
// ══════════════════════════════════════════════════════════
function buildCakeScene(container, width, height, autoRotate){
  const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
  renderer.setSize(width, height);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.outputEncoding = THREE.sRGBEncoding;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.25;
  container.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(42, width/height, 0.1, 100);
  camera.position.set(0, 3.2, 8.5);
  camera.lookAt(0, 2.2, 0);

  // ── LIGHTS ──
  scene.add(new THREE.AmbientLight(0xf0e0ff, 0.75));
  const key = new THREE.DirectionalLight(0xfff0ff, 2.4);
  key.position.set(-4, 9, 5); key.castShadow=true;
  key.shadow.mapSize.set(2048,2048);
  key.shadow.camera.left=-5; key.shadow.camera.right=5;
  key.shadow.camera.top=6; key.shadow.camera.bottom=-4;
  key.shadow.bias=-0.001;
  scene.add(key);
  const fill = new THREE.DirectionalLight(0xd0c0ff, 1.0);
  fill.position.set(5,4,-3); scene.add(fill);
  const rim = new THREE.DirectionalLight(0xc080ff, 0.7);
  rim.position.set(0,2,-6); scene.add(rim);
  const candlePt = new THREE.PointLight(0xff9933, 2.2, 5);
  candlePt.position.set(0.08, 5.6, 0); scene.add(candlePt);
  // Purple under-glow
  const underGlow = new THREE.PointLight(0xaa44ff, 0.8, 4);
  underGlow.position.set(0, 0.5, 0); scene.add(underGlow);

  // ── MATERIAL HELPERS ──
  function frostTex(c1,c2,highlight=true){
    const cv=document.createElement('canvas'); cv.width=512; cv.height=256;
    const ctx=cv.getContext('2d');
    const g=ctx.createLinearGradient(0,0,512,256);
    g.addColorStop(0,c1); g.addColorStop(0.5,c2); g.addColorStop(1,c1);
    ctx.fillStyle=g; ctx.fillRect(0,0,512,256);
    // noise
    for(let i=0;i<4000;i++){
      ctx.fillStyle=`rgba(255,255,255,${Math.random()*.05})`;
      ctx.fillRect(Math.random()*512,Math.random()*256,2,2);
    }
    // subtle stripe highlights
    if(highlight){
      for(let x=0;x<512;x+=52){
        const hg=ctx.createLinearGradient(x,0,x+28,0);
        hg.addColorStop(0,'rgba(255,255,255,0)');
        hg.addColorStop(0.5,'rgba(255,255,255,0.18)');
        hg.addColorStop(1,'rgba(255,255,255,0)');
        ctx.fillStyle=hg; ctx.fillRect(x,0,28,256);
      }
    }
    return new THREE.CanvasTexture(cv);
  }
  function mat(color,rough=0.32,metal=0.0,tex=null){
    return new THREE.MeshStandardMaterial({color,roughness:rough,metalness:metal,map:tex||null});
  }

  // Tier materials — purple palette
  const m1s = new THREE.MeshStandardMaterial({map:frostTex('#9b30d0','#7a18b0'),roughness:0.3,metalness:0.0});
  const m1t = new THREE.MeshStandardMaterial({map:frostTex('#c060f0','#a040d8'),roughness:0.2,metalness:0.05});
  const m2s = new THREE.MeshStandardMaterial({map:frostTex('#b050e0','#9030c8'),roughness:0.28,metalness:0.0});
  const m2t = new THREE.MeshStandardMaterial({map:frostTex('#d080ff','#b860e8'),roughness:0.18,metalness:0.05});
  const m3s = new THREE.MeshStandardMaterial({map:frostTex('#c878f0','#aa50e0'),roughness:0.25,metalness:0.0});
  const m3t = new THREE.MeshStandardMaterial({map:frostTex('#e8b0ff','#d090f8'),roughness:0.15,metalness:0.06});
  const glazeMat = mat(0xcc44ff, 0.06, 0.15);
  const creamMat = mat(0xf8f0ff, 0.45);
  const berryMat = mat(0xdd1155, 0.4);
  const leafMat  = mat(0x2e7d32, 0.6);
  const plateMat = new THREE.MeshStandardMaterial({color:0xc8a0e8,roughness:0.12,metalness:0.35});
  const colMat   = new THREE.MeshStandardMaterial({color:0xaa80d0,roughness:0.18,metalness:0.28});
  const candleMat= mat(0xeeccff,0.4);
  const wickMat  = mat(0x2a1000,0.9);

  // ── ROOT GROUP ──
  const root = new THREE.Group();
  scene.add(root);

  function cyl(rT,rB,h,seg,mSide,mTop,mBot,y){
    const geo=new THREE.CylinderGeometry(rT,rB,h,seg,1,false);
    const mesh=new THREE.Mesh(geo,[mSide,mTop||mSide,mBot||mSide]);
    mesh.position.y=y; mesh.castShadow=true; mesh.receiveShadow=true;
    root.add(mesh); return mesh;
  }

  // PLATE
  cyl(1.45,1.55,0.12,64,plateMat,plateMat,plateMat,0.06);
  cyl(0.18,0.22,0.55,32,colMat,colMat,colMat,0.61);
  cyl(0.30,0.30,0.08,32,plateMat,plateMat,plateMat,0.93);

  // TIERS
  const T1Y=0.97, T1R=1.28, T1H=0.9;
  cyl(T1R,T1R,T1H,80,m1s,m1t,m1s, T1Y+T1H/2);
  const T2Y=T1Y+T1H, T2R=0.98, T2H=0.72;
  cyl(T2R,T2R,T2H,72,m2s,m2t,m2s, T2Y+T2H/2);
  const T3Y=T2Y+T2H, T3R=0.68, T3H=0.56;
  cyl(T3R,T3R,T3H,64,m3s,m3t,m3s, T3Y+T3H/2);

  // GLAZE DRIPS
  function glaze(tY,tH,tR,count,dH=0.2){
    // top disc
    const dg=new THREE.CylinderGeometry(tR+0.015,tR+0.015,0.045,80);
    const dm=new THREE.Mesh(dg,glazeMat); dm.position.y=tY+tH+0.022; dm.castShadow=true; root.add(dm);
    for(let i=0;i<count;i++){
      const a=(i/count)*Math.PI*2, rnd=0.5+Math.random()*0.5;
      const dh=dH*rnd;
      const cg=new THREE.CylinderGeometry(0.042,0.026,dh,12);
      const cm=new THREE.Mesh(cg,glazeMat);
      cm.position.set(Math.cos(a)*(tR+0.012), tY+tH-dh/2, Math.sin(a)*(tR+0.012));
      cm.castShadow=true; root.add(cm);
      const bg=new THREE.SphereGeometry(0.048,10,8);
      const bm=new THREE.Mesh(bg,glazeMat);
      bm.position.set(Math.cos(a)*(tR+0.012), tY+tH-dh-0.012, Math.sin(a)*(tR+0.012));
      root.add(bm);
    }
  }
  glaze(T1Y,T1H,T1R,24,0.24);
  glaze(T2Y,T2H,T2R,20,0.21);
  glaze(T3Y,T3H,T3R,15,0.18);

  // CREAM ROSETTES
  function rosette(x,y,z,sc=1){
    const g=new THREE.Group();
    const c=new THREE.Mesh(new THREE.SphereGeometry(0.09*sc,16,12),creamMat); c.castShadow=true; g.add(c);
    for(let i=0;i<7;i++){
      const a=(i/7)*Math.PI*2;
      const p=new THREE.Mesh(new THREE.SphereGeometry(0.07*sc,12,10),creamMat); p.castShadow=true;
      p.position.set(Math.cos(a)*0.11*sc,-0.02*sc,Math.sin(a)*0.11*sc); g.add(p);
    }
    g.position.set(x,y,z); root.add(g);
  }
  for(let i=0;i<11;i++) rosette(Math.cos((i/11)*Math.PI*2)*1.02,T1Y+T1H+0.07,Math.sin((i/11)*Math.PI*2)*1.02,0.92);
  for(let i=0;i<8;i++)  rosette(Math.cos((i/8)*Math.PI*2)*0.77, T2Y+T2H+0.07,Math.sin((i/8)*Math.PI*2)*0.77, 0.82);
  for(let i=0;i<6;i++)  rosette(Math.cos((i/6)*Math.PI*2)*0.52, T3Y+T3H+0.06,Math.sin((i/6)*Math.PI*2)*0.52, 0.74);

  // STRAWBERRIES
  function berry(x,y,z,ry=0){
    const g=new THREE.Group(); g.position.set(x,y,z); g.rotation.y=ry;
    const bg=new THREE.SphereGeometry(0.14,16,14); bg.scale(1,1.28,1);
    const b=new THREE.Mesh(bg,berryMat); b.position.y=0.06; b.castShadow=true; g.add(b);
    for(let i=0;i<4;i++){
      const a=(i/4)*Math.PI*2;
      const l=new THREE.Mesh(new THREE.ConeGeometry(0.06,0.15,6),leafMat);
      l.position.set(Math.cos(a)*0.06,0.2,Math.sin(a)*0.06);
      l.rotation.z=Math.cos(a)*0.5; l.rotation.x=Math.sin(a)*0.5; g.add(l);
    }
    const sh=new THREE.Mesh(new THREE.SphereGeometry(0.04,8,8),
      new THREE.MeshStandardMaterial({color:0xffffff,roughness:0,transparent:true,opacity:0.55}));
    sh.position.set(-0.04,0.12,0.09); g.add(sh);
    root.add(g);
  }
  for(let i=0;i<6;i++) berry(Math.cos((i/6)*Math.PI*2)*0.88,T1Y+T1H+0.11,Math.sin((i/6)*Math.PI*2)*0.88,i);
  for(let i=0;i<5;i++) berry(Math.cos((i/5)*Math.PI*2)*0.64,T2Y+T2H+0.11,Math.sin((i/5)*Math.PI*2)*0.64,i);

  // LOLLIPOPS — candy-colored with purple tones
  function lollipop(x,z,baseY,stH,hR,ca,cb){
    const g=new THREE.Group();
    const stick=new THREE.Mesh(new THREE.CylinderGeometry(0.026,0.026,stH,10),
      new THREE.MeshStandardMaterial({color:0xd4a060,roughness:0.5}));
    stick.position.y=stH/2; stick.castShadow=true; g.add(stick);
    const cv=document.createElement('canvas'); cv.width=128; cv.height=128;
    const ctx=cv.getContext('2d');
    [ca,cb,ca,cb,ca,cb].forEach((c,i)=>{
      ctx.beginPath(); ctx.moveTo(64,64);
      ctx.arc(64,64,62,(i/6)*Math.PI*2,((i+1)/6)*Math.PI*2);
      ctx.closePath(); ctx.fillStyle=c; ctx.fill();
    });
    ctx.beginPath(); ctx.arc(42,38,22,0,Math.PI*1.1);
    ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=9; ctx.stroke();
    const hm=new THREE.MeshStandardMaterial({map:new THREE.CanvasTexture(cv),roughness:0.07,metalness:0.1,side:THREE.DoubleSide});
    const head=new THREE.Mesh(new THREE.CylinderGeometry(hR,hR,0.09,64),hm);
    head.position.y=stH+0.045; head.rotation.x=Math.PI/2; head.castShadow=true; g.add(head);
    g.position.set(x,baseY,z); root.add(g);
  }
  const LY=T3Y+T3H;
  lollipop(-0.28, 0.1,  LY, 0.78, 0.24, '#cc44ff','#ffffff');
  lollipop( 0.24,-0.1,  LY, 0.66, 0.19, '#ff88cc','#ffffaa');
  lollipop(-0.06,-0.22, LY+0.06, 0.56, 0.15, '#88aaff','#ffffff');

  // CANDLE
  const CY=T3Y+T3H+0.05;
  const candle=new THREE.Mesh(new THREE.CylinderGeometry(0.068,0.068,0.44,24),candleMat);
  candle.position.set(0.08,CY+0.22,-0.08); candle.castShadow=true; root.add(candle);
  // Drip on candle
  const wm=new THREE.Mesh(new THREE.CylinderGeometry(0.008,0.008,0.06,8),wickMat);
  wm.position.set(0.08,CY+0.47,-0.08); root.add(wm);

  // FLAME
  const flameGrp=new THREE.Group();
  flameGrp.position.set(0.08,CY+0.56,-0.08);
  const fcv=document.createElement('canvas'); fcv.width=64; fcv.height=128;
  const fctx=fcv.getContext('2d');
  const fg=fctx.createRadialGradient(32,80,2,32,70,30);
  fg.addColorStop(0,'rgba(255,255,240,1)');
  fg.addColorStop(0.2,'rgba(255,220,60,1)');
  fg.addColorStop(0.5,'rgba(255,100,0,0.9)');
  fg.addColorStop(1,'rgba(200,0,100,0)');
  fctx.fillStyle=fg; fctx.fillRect(0,0,64,128);
  const flameMat=new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(fcv),transparent:true,depthWrite:false,side:THREE.DoubleSide});
  for(let i=0;i<3;i++){
    const fp=new THREE.Mesh(new THREE.PlaneGeometry(0.2,0.34),flameMat);
    fp.rotation.y=i*(Math.PI/3); flameGrp.add(fp);
  }
  root.add(flameGrp);

  // SHADOW PLANE
  const sp=new THREE.Mesh(new THREE.PlaneGeometry(8,8),new THREE.ShadowMaterial({opacity:0.15}));
  sp.rotation.x=-Math.PI/2; sp.receiveShadow=true; scene.add(sp);

  // ── STATE ──
  let rotY=0, targetRotY=0;
  let isDrag=false, prevMX=0;
  let t=0;
  const isHome=autoRotate;

  if(!isHome){
    renderer.domElement.style.pointerEvents='none';
  }

  // ── RENDER LOOP ──
  function tick(){
    requestAnimationFrame(tick);
    t+=0.016;
    if(isHome) targetRotY+=0.004;
    rotY+=(targetRotY-rotY)*0.07;
    root.rotation.y=rotY;
    root.rotation.x=0.08;
    // Flicker
    const flk=0.85+Math.sin(t*11)*0.08+Math.sin(t*17)*0.04;
    candlePt.intensity=2.2*flk;
    flameGrp.scale.set(flk, 0.88+Math.sin(t*13)*0.14, flk);
    flameGrp.rotation.y=t*2.5;
    renderer.render(scene,camera);
  }
  tick();

  return {
    renderer, scene, root,
    setRotY(a){ targetRotY=a; },
    addRotY(d){ targetRotY+=d; },
    getRotY(){ return rotY; },
    syncRotY(a){ targetRotY=a; rotY=a; }
  };
}

// ══════════════════════════════════════════════════════════
// INIT HOME CAKE
// ══════════════════════════════════════════════════════════
const homeWrap = document.getElementById('home-canvas-wrap');
const homeW = homeWrap.clientWidth||420, homeH = homeWrap.clientHeight||520;
const homeCake = buildCakeScene(homeWrap, homeW, homeH, true);

// ══════════════════════════════════════════════════════════
// TRANSITION
// ══════════════════════════════════════════════════════════
let galleryCake = null;

function startTransition(){
  const wrap = document.getElementById('home-canvas-wrap');
  wrap.style.transition='transform 1.1s cubic-bezier(.4,0,.2,1),opacity 1.1s ease';
  wrap.style.transformOrigin='center center';
  wrap.style.transform='scale(3.8) translateY(-15%)';
  wrap.style.opacity='0';

  setTimeout(()=>{
    document.body.classList.add('show-gallery');
    buildGallery();
    const gw=document.getElementById('gallery-canvas-wrap');
    gw.style.opacity='0';
    gw.style.transform='translate(-50%,-50%) scale(2.6)';
    gw.style.transition='transform 1s cubic-bezier(.34,1.2,.64,1),opacity .85s ease';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      gw.style.transform='translate(-50%,-50%) scale(1)';
      gw.style.opacity='1';
    }));
    setTimeout(fadeInPhotos,560);
  },1100);
}

// ══════════════════════════════════════════════════════════
// GALLERY
// ══════════════════════════════════════════════════════════
let galleryBuilt=false;
let carouselAngle=0, targetAngle=0;
let glowIntensity=0;
let cardStates=[];
let mouseX=0, mouseY=0;
const CARD_W=110, CARD_H=139;

function buildGallery(){
  if(galleryBuilt)return; galleryBuilt=true;

  // Build gallery Three.js cake (non-auto-rotating, driven by carousel)
  const gw=document.getElementById('gallery-canvas-wrap');
  galleryCake=buildCakeScene(gw, 280, 340, false);
  galleryCake.syncRotY(homeCake.getRotY());

  const container=document.getElementById('carousel-3d');
  const isMob=window.innerWidth<600;
  const RX=isMob?190:295, RY=isMob?85:128;

  memories.forEach((mem,i)=>{
    const card=document.createElement('div');
    card.className='photo-card'; card.dataset.index=i;
    card.innerHTML=`<div class="photo-inner"><img src="${mem.image}" loading="lazy" alt="${mem.title}" draggable="false"/><div class="cap">${mem.title}</div></div>`;
    card.addEventListener('click',()=>openModal(i));
    card.style.opacity='0';
    container.appendChild(card);
    cardStates.push({
      floatPhase:Math.random()*Math.PI*2,
      floatSpeed:0.012+Math.random()*0.008,
      floatAmp:6+Math.random()*5,
      floatOffset:0,
      currentLift:0, currentScale:1, currentGlow:0,
    });
  });

  startGalleryLoop(RX,RY);
  setupInput();
}

function fadeInPhotos(){
  document.querySelectorAll('.photo-card').forEach((c,i)=>{
    setTimeout(()=>{ c.style.transition='opacity .5s ease'; c.style.opacity='1'; },i*60);
  });
}

function startGalleryLoop(RX,RY){
  const cards=[...document.querySelectorAll('.photo-card')];
  const n=cards.length;

  function loop(){
    const diff=targetAngle-carouselAngle;
    carouselAngle+=diff*0.1;
    const rawSpeed=Math.abs(diff);
    const tGlow=Math.min(1,rawSpeed/12);
    glowIntensity+=(tGlow-glowIntensity)*(tGlow>glowIntensity?0.18:0.04);
    if(glowIntensity<0.002) glowIntensity=0;

    // Sync gallery cake rotation
    if(galleryCake) galleryCake.addRotY(diff*0.1*(-1/1));

    cards.forEach((card,i)=>{
      if(card.style.opacity==='0') return;
      const st=cardStates[i];
      const ang=(i/n)*360+carouselAngle;
      const rad=ang*(Math.PI/180);
      const cx=Math.cos(rad)*RX, cy=Math.sin(rad)*RY;
      const sinV=Math.sin(rad);
      const zi=Math.round((sinV+1)*10)+5;
      const depthScale=0.78+(sinV+1)*0.13;

      // Hover detection
      const vpCX=window.innerWidth/2, vpCY=window.innerHeight/2;
      const sx=vpCX+cx-CARD_W/2, sy=vpCY+cy-CARD_H/2;
      const under=mouseX>=sx&&mouseX<=sx+CARD_W&&mouseY>=sy&&mouseY<=sy+CARD_H;

      const tLift=under?-20:0;
      const tScale=under?depthScale*1.15:depthScale;
      st.currentLift+=(tLift-st.currentLift)*0.1;
      st.currentScale+=(tScale-st.currentScale)*0.1;
      st.floatPhase+=st.floatSpeed;
      const floatY=under?0:Math.sin(st.floatPhase)*st.floatAmp;
      st.floatOffset+=(floatY-st.floatOffset)*0.06;

      const tGlowCard=glowIntensity+(under?0.55:0);
      st.currentGlow+=(Math.min(1,tGlowCard)-st.currentGlow)*0.1;

      const totalY=cy+st.currentLift+st.floatOffset;
      card.style.transform=`translate(calc(${cx}px - ${CARD_W/2}px),calc(${totalY}px - ${CARD_H/2}px)) rotate(${((i%3)-1)*8}deg) scale(${st.currentScale})`;
      card.style.zIndex=under?50:zi;

      const inner=card.querySelector('.photo-inner');
      const g=st.currentGlow;
      if(g<0.005){
        inner.style.boxShadow='0 8px 28px rgba(100,20,160,.2)';
      } else {
        const a1=(g*.9).toFixed(3),a2=(g*.55).toFixed(3),a3=(g*.3).toFixed(3);
        const s1=Math.round(g*18),s2=Math.round(g*36),s3=Math.round(g*60);
        inner.style.boxShadow=
          `0 8px 28px rgba(100,20,160,.2),`+
          `0 0 ${s1}px ${Math.round(g*4)}px rgba(180,80,255,${a1}),`+
          `0 0 ${s2}px ${Math.round(g*8)}px rgba(200,130,255,${a2}),`+
          `0 0 ${s3}px ${Math.round(g*16)}px rgba(220,180,255,${a3})`;
      }
    });
    requestAnimationFrame(loop);
  }
  loop();
}

// ── INPUT ──
let dragging=false,dStartX=0,dStartA=0,lastDelta=0;
function setupInput(){
  const el=document.getElementById('gallery-inner');
  el.addEventListener('mousemove',e=>{ mouseX=e.clientX; mouseY=e.clientY; });
  el.addEventListener('mouseleave',()=>{ mouseX=-9999; mouseY=-9999; });
  el.addEventListener('wheel',e=>{ e.preventDefault(); targetAngle+=e.deltaY*.3+e.deltaX*.3; },{passive:false});
  el.addEventListener('touchstart',e=>{ dragging=true; dStartX=e.touches[0].clientX; dStartA=targetAngle; lastDelta=0; },{passive:true});
  el.addEventListener('touchmove',e=>{ if(!dragging)return; const dx=e.touches[0].clientX-dStartX; lastDelta=(dStartA-dx*.7)-targetAngle; targetAngle=dStartA-dx*.7; },{passive:true});
  el.addEventListener('touchend',()=>{ dragging=false; let v=lastDelta*10; (function f(){if(Math.abs(v)<.05)return;v*=.93;targetAngle+=v;requestAnimationFrame(f);})(); });
  el.addEventListener('mousedown',e=>{ dragging=true; dStartX=e.clientX; dStartA=targetAngle; lastDelta=0; });
  el.addEventListener('mousemove',e=>{ if(!dragging)return; const dx=e.clientX-dStartX; lastDelta=(dStartA-dx*.6)-targetAngle; targetAngle=dStartA-dx*.6; });
  el.addEventListener('mouseup',()=>{ dragging=false; let v=lastDelta*10; (function f(){if(Math.abs(v)<.05)return;v*=.93;targetAngle+=v;requestAnimationFrame(f);})(); });
  el.addEventListener('mouseleave',()=>dragging=false);
}

// ── MODAL ──
function openModal(i){
  const m=memories[i];
  document.getElementById('modal-img-el').src=m.image;
  document.getElementById('modal-title').textContent=m.title;
  document.getElementById('modal-letter').textContent=m.letter;
  document.getElementById('modal').classList.add('open');
}
function closeModal(){ document.getElementById('modal').classList.remove('open'); }
document.getElementById('modal').addEventListener('click',function(e){ if(e.target===this)closeModal(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape')closeModal(); });

// ── MUSIC ──
document.addEventListener('click',function startM(){
  document.getElementById('bgm').play().catch(()=>{});
  document.removeEventListener('click',startM);
},{once:true});

// ── RESIZE ──
window.addEventListener('resize',()=>{
  [homeCake].forEach(ck=>{
    if(!ck)return;
    ck.renderer.setSize(homeWrap.clientWidth,homeWrap.clientHeight);
  });
});
</script>
